name: Nightly Healthcheck
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  integration_health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -c "print('Nightly drift/healthcheck placeholder: add Linear/n8n/provider checks')"
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-healthcheck
          path: .
